<!DOCTYPE html>
<html>
<head>
<title>DripStudio</title>

<style>
html{
    scroll-behavior:smooth;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f0f0f;
    color:white;
}

nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 40px;
    background:#111;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.hero{
    height:80vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:20px;
}

.hero h1{
    font-size:70px;
    margin-bottom:10px;
}

.hero p{
    font-size:22px;
    color:#bbb;
    margin-bottom:25px;
}

.btn{
    background:white;
    color:black;
    padding:15px 30px;
    text-decoration:none;
    border-radius:8px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:scale(1.05);
}

.section{
    padding:60px 20px;
    text-align:center;
}

.cards{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:20px;
    margin-top:30px;
}

.card{
    background:#1b1b1b;
    padding:25px;
    width:220px;
    border-radius:12px;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-5px);
}

footer{
    text-align:center;
    padding:30px;
    color:#888;
}
</style>
</head>

<body>

<nav>
    <div class="logo">DRIPSTUDIO</div>
</nav>

<section class="hero">
    <h1>STYLE WITHOUT LIMITS</h1>
    <p>Streetwear • Jerseys • Hoodies • More</p>

    <a href="#products" class="btn">
        Shop Collection
    </a>
</section>

<section id="products" class="section">

    <h2>Collections</h2>

    <div class="cards">

        <div class="card">
            <h3>T-Shirts</h3>
            <p>Premium quality tees</p>
        </div>

        <div class="card">
            <h3>Hoodies</h3>
            <p>Comfort meets style</p>
        </div>

        <div class="card">
            <h3>Jerseys</h3>
            <p>Sports & football wear</p>
        </div>

        <div class="card">
            <h3>Accessories</h3>
            <p>Complete your fit</p>
        </div>

    </div>

</section>

<footer>
    © 2026 DripStudio
</footer>

</body>
</html>
